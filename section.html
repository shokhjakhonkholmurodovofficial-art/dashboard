<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Section</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            padding: 40px;
        }

        section {
            max-width: 900px;
            margin: 0 auto;
        }

        .section-header {
            margin-bottom: 30px;
        }

        .section-header h1 {
            font-size: 2rem;
            color: #1a1a2e;
        }

        .section-header p {
            color: #666;
            margin-top: 6px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card .icon {
            font-size: 2rem;
            margin-bottom: 12px;
        }

        .card h3 {
            font-size: 1rem;
            color: #555;
            margin-bottom: 8px;
        }

        .card .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .card .change {
            margin-top: 6px;
            font-size: 0.85rem;
            color: #27ae60;
        }
    </style>
</head>

<body>
    <section>
        <div class="section-header">
            <h1>Dashboard Overview</h1>
            <p>Welcome back! Here's what's happening today.</p>
        </div>

        <div class="cards">
            <div class="card">
                <div class="icon">👥</div>
                <h3>Total Users</h3>
                <div class="value">12,480</div>
                <div class="change">+8.2% from last month</div>
            </div>
            <div class="card">
                <div class="icon">📦</div>
                <h3>Orders</h3>
                <div class="value">3,291</div>
                <div class="change">+4.5% from last month</div>
            </div>
            <div class="card">
                <div class="icon">💰</div>
                <h3>Revenue</h3>
                <div class="value">$94,200</div>
                <div class="change">+12.1% from last month</div>
            </div>
        </div>
    </section>
</body>

</html>

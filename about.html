<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            body: ['Jost', 'sans-serif'],
          },
          colors: {
            teal: { 400: '#00d4a8', 500: '#00b890' },
            violet: { 400: '#7c6af5', 500: '#6355e8' },
            ink: {
              900: '#0f1221',
              800: '#161929',
              700: '#1a1e2e',
              600: '#1e2236',
              500: '#242840',
            },
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Jost', sans-serif; }

    .nav-link {
      position: relative;
      transition: color 0.3s;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: #00d4a8;
      box-shadow: 0 0 8px #00d4a8;
      transition: width 0.3s ease;
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    .nav-link.active {
      color: #00d4a8;
    }

    .hamburger span {
      display: block;
      height: 1.5px;
      background: currentColor;
      transition: transform 0.3s, opacity 0.3s, width 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  </style>
</head>

<body class="bg-ink-700 text-white min-h-screen">

  <!-- NAVBAR -->
  <nav class="sticky top-0 z-50 bg-ink-800/90 backdrop-blur-md border-b border-white/5">
    <div class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16">

      <!-- Logo -->
      <a href="index.html" class="flex items-center gap-3 group">
        <div class="w-8 h-8 rounded-lg bg-teal-400/10 border border-teal-400/20 flex items-center justify-center group-hover:bg-teal-400/20 transition-colors duration-300">
          <svg class="w-4 h-4 text-teal-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10l2 2h7l1-2z"/>
            <path d="M13 12h5l3 4v-4h-8"/>
            <circle cx="6" cy="20" r="2"/>
            <circle cx="18" cy="20" r="2"/>
          </svg>
        </div>
        <div>
          <p class="font-display text-xl tracking-widest leading-none">Dashboard</p>
          <p class="text-[9px] tracking-[0.2em] uppercase text-white/35 leading-none mt-0.5">Логистика</p>
        </div>
      </a>

      <!-- Desktop links -->
      <div class="hidden md:flex items-center gap-8">
        <a href="index.html" class="nav-link text-sm font-medium tracking-wide text-white/50 hover:text-white pb-0.5">
          Dashboard
        </a>
        <a href="#" class="nav-link text-sm font-medium tracking-wide text-white/50 hover:text-white pb-0.5">
          Analytics
        </a>
        <a href="#" class="nav-link text-sm font-medium tracking-wide text-white/50 hover:text-white pb-0.5">
          Routes
        </a>
        <a href="about.html" class="nav-link active text-sm font-medium tracking-wide pb-0.5">
          About
        </a>
      </div>

      <!-- Right side -->
      <div class="hidden md:flex items-center gap-3">
        <span class="flex items-center gap-1.5 text-[10px] tracking-widest uppercase text-teal-400 font-semibold">
          <span class="w-1.5 h-1.5 rounded-full bg-teal-400 animate-pulse"></span>
          Live
        </span>
        <a href="index.html"
          class="px-4 py-1.5 rounded-full bg-teal-400/10 border border-teal-400/20 text-teal-400 text-[11px] font-semibold tracking-widest uppercase hover:bg-teal-400/20 hover:border-teal-400/40 transition-all duration-300">
          Open App
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button id="menuBtn" onclick="toggleMenu()"
        class="hamburger md:hidden flex flex-col gap-1.5 w-6 text-white/60 hover:text-white focus:outline-none">
        <span class="w-6"></span>
        <span class="w-4"></span>
        <span class="w-6"></span>
      </button>
    </div>

    <!-- Mobile menu -->
    <div id="mobileMenu"
      class="md:hidden hidden border-t border-white/5 bg-ink-800 px-6 py-4 flex-col gap-1">
      <a href="index.html"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white/50 hover:text-white hover:bg-white/5 transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Dashboard
      </a>
      <a href="#"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white/50 hover:text-white hover:bg-white/5 transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Analytics
      </a>
      <a href="#"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-white/50 hover:text-white hover:bg-white/5 transition-colors">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
        </svg>
        Routes
      </a>
      <a href="about.html"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-teal-400 bg-teal-400/5 border border-teal-400/10">
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        About
      </a>
    </div>
  </nav>

  <!-- PAGE CONTENT PLACEHOLDER -->
  <main class="max-w-6xl mx-auto px-6 py-16">
    <div class="text-center">
      <h1 class="font-display text-6xl tracking-[0.3em] leading-none mb-4">ABOUT</h1>
      <p class="text-white/40 text-sm tracking-widest uppercase">Транспорт Родовиарио</p>
    </div>
  </main>

  <script>
    function toggleMenu() {
      const menu = document.getElementById('mobileMenu')
      const btn = document.getElementById('menuBtn')
      const isHidden = menu.classList.contains('hidden')
      menu.classList.toggle('hidden', !isHidden)
      menu.classList.toggle('flex', isHidden)
      btn.classList.toggle('open', isHidden)
    }
  </script>

</body>

</html>
